<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="#0a0a0f"/>
  
  <!-- Basketball circle -->
  <circle cx="256" cy="220" r="130" fill="#C8A84B" opacity="0.15" stroke="#C8A84B" stroke-width="3"/>
  
  <!-- Basketball lines -->
  <circle cx="256" cy="220" r="100" fill="none" stroke="#C8A84B" stroke-width="6" opacity="0.6"/>
  <line x1="256" y1="120" x2="256" y2="320" stroke="#C8A84B" stroke-width="4" opacity="0.5"/>
  <line x1="156" y1="220" x2="356" y2="220" stroke="#C8A84B" stroke-width="4" opacity="0.5"/>
  <path d="M 176 145 Q 256 190 176 295" fill="none" stroke="#C8A84B" stroke-width="4" opacity="0.5"/>
  <path d="M 336 145 Q 256 190 336 295" fill="none" stroke="#C8A84B" stroke-width="4" opacity="0.5"/>

  <!-- IJ text in center -->
  <text x="256" y="245" font-family="Arial Black, sans-serif" font-size="72" font-weight="900" fill="#C8A84B" text-anchor="middle" letter-spacing="4">IJ</text>

  <!-- Bottom text -->
  <text x="256" y="400" font-family="Arial Narrow, sans-serif" font-size="38" font-weight="700" fill="#C8A84B" text-anchor="middle" letter-spacing="6" opacity="0.9">NBA 2026</text>
  
  <!-- Bottom accent line -->
  <rect x="156" y="412" width="200" height="3" rx="2" fill="#dd4444"/>
</svg>
